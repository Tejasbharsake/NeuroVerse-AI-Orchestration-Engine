name: NeuroVerse AI Orchestration CI/CD

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    name: Backend Tests & Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest bandit
          
      - name: Lint & Security Scan
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          bandit -r app/

  frontend-build:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
          
      - name: Install & Build Dashboard
        run: |
          cd dashboard
          npm install
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  docker-build:
    name: Build Docker Image
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/feature/'))
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: |
          docker build -t neuroverse-engine:${{ github.sha }} .
